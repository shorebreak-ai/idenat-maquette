<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IDENAT — Briefs de modifications du site</title>
<style>
  :root{--teal:#0099a1;--charbon:#222a2e;--bg:#fafaf8;--line:#e7e7e1;--txt:#23292c;--mut:#6a747a}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--txt);line-height:1.62;-webkit-text-size-adjust:100%}
  header{position:sticky;top:0;z-index:5;background:var(--charbon);color:#fff;padding:14px 18px}
  header h1{margin:0;font-size:1rem;font-weight:700;letter-spacing:.02em}
  header p{margin:3px 0 0;font-size:.72rem;color:rgba(255,255,255,.7)}
  nav{position:sticky;top:53px;z-index:4;background:#fff;border-bottom:1px solid var(--line);display:flex;gap:6px;overflow-x:auto;padding:9px 12px;-webkit-overflow-scrolling:touch}
  nav a{flex:0 0 auto;font-size:.8rem;font-weight:600;text-decoration:none;color:var(--charbon);background:#f0f1ec;border:1px solid var(--line);padding:7px 12px;border-radius:20px;white-space:nowrap}
  nav a:active{background:var(--teal);color:#fff}
  main{max-width:780px;margin:0 auto;padding:8px 18px 80px}
  section.brief{padding:22px 0;border-bottom:8px solid var(--line)}
  .md h1{font-size:1.5rem;line-height:1.2;margin:.4em 0 .3em;color:var(--charbon)}
  .md h2{font-size:1.12rem;margin:1.4em 0 .4em;color:var(--teal);border-top:1px solid var(--line);padding-top:.9em}
  .md h3{font-size:1rem;margin:1.1em 0 .3em;color:var(--charbon)}
  .md p,.md li{font-size:1rem}
  .md strong{color:#111}
  .md blockquote{margin:.8em 0;padding:.6em .9em;background:#fff;border-left:3px solid var(--teal);color:var(--mut);font-size:.93rem;border-radius:0 6px 6px 0}
  .md code{background:#eef0ea;padding:1px 5px;border-radius:4px;font-size:.85em}
  .md ul,.md ol{padding-left:1.25em}
  .md li{margin:.25em 0}
  .md a{color:var(--teal)}
  .md table{border-collapse:collapse;width:100%;font-size:.8rem;margin:1em 0;display:block;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .md th,.md td{border:1px solid var(--line);padding:5px 7px;text-align:left;vertical-align:top}
  .md th{background:#f0f1ec;white-space:nowrap}
  .loading{color:var(--mut);font-size:.9rem;padding:20px 0}
  footer{max-width:780px;margin:0 auto;padding:0 18px 40px;color:var(--mut);font-size:.78rem}
</style>
</head>
<body>
<header>
  <h1>IDENAT — Briefs de modifications du site</h1>
  <p>Sprint pré-congrès · on modifie l'existant, avec l'existant · <a href="gallery.html" style="color:#7fdfe4;text-decoration:none">📷 Galerie des images</a></p>
</header>
<nav id="nav"></nav>
<main id="app"><p class="loading">Chargement des briefs…</p></main>
<footer>Document interne Shorebreak · lecture mobile</footer>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
  const briefs = [
    {id:'yassine',  t:'⚑ Directives Yassine',     f:'briefs/DIRECTIVES_YASSINE.md'},
    {id:'journal',  t:'📋 Journal des modifs',    f:'briefs/JOURNAL_MODIFS_SITE.md'},
    {id:'plan',     t:'🎯 Plan congrès',          f:'briefs/00c_PLAN_CONGRES.md'},
    {id:'profils',  t:'Profils & comportements', f:'briefs/COMPORTEMENTS_PROFILS.md'},
    {id:'regles',   t:'Règles communes',         f:'briefs/00_REGLES_COMMUNES.md'},
    {id:'carto',    t:'Cartographie du site',    f:'briefs/00b_CARTOGRAPHIE_SITE.md'},
    {id:'accueil',  t:'Accueil',                 f:'briefs/01_BRIEF_accueil.md'},
    {id:'naturo',   t:'Naturothérapie',          f:'briefs/05_BRIEF_naturotherapie.md'},
    {id:'filiation',t:'Filiation',               f:'briefs/02_BRIEF_filiation.md'},
    {id:'formation',t:'Formation (3 ans)',       f:'briefs/06_BRIEF_formation_3ans.md'},
    {id:'programme',t:'Programme & inscription',  f:'briefs/04_BRIEF_programme_inscription.md'},
    {id:'equipe',   t:'Corps enseignant',        f:'briefs/03_BRIEF_equipe_pedagogique.md'},
    {id:'master',   t:'Master Classe',           f:'briefs/07_BRIEF_master_classe.md'},
    {id:'blog',     t:'Blog',                    f:'briefs/08_BRIEF_blog.md'},
    {id:'contact',  t:'Contact & mentions',      f:'briefs/09_BRIEF_contact_mentions.md'},
  ];
  const nav = document.getElementById('nav');
  briefs.forEach(b=>{const a=document.createElement('a');a.href='#'+b.id;a.textContent=b.t;nav.appendChild(a);});
  (async()=>{
    const app=document.getElementById('app');app.innerHTML='';
    for(const b of briefs){
      const sec=document.createElement('section');sec.className='brief';sec.id=b.id;
      try{
        const r=await fetch(b.f,{cache:'no-store'});const md=await r.text();
        const div=document.createElement('div');div.className='md';div.innerHTML=marked.parse(md);
        sec.appendChild(div);
      }catch(e){sec.innerHTML='<p>Impossible de charger '+b.f+'</p>';}
      app.appendChild(sec);
    }
  })();
</script>
</body>
</html>
